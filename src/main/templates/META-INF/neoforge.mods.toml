modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "GPL-3.0-or-later"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "_vuis"
description = ''''''

[[mixins]]
config = "${mod_id}.mixins.json"

[[dependencies.${mod_id}]]
modId = "neoforge"
type = "required"
versionRange = "[${neoforge_version},)"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "minecraft"
type = "required"
versionRange = "[${minecraft_version}]"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "bf"
type = "required"
versionRange = "[${blockfront_version}]"
ordering = "AFTER"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "voicechat_api"
type = "optional"
versionRange = "[${voicechat_api_version},)"
ordering = "AFTER"
side = "BOTH"
